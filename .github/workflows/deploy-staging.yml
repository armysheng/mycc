name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_PORT: ${{ secrets.STAGING_PORT }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      STAGING_PROJECT_DIR: ${{ secrets.STAGING_PROJECT_DIR }}
      STAGING_FRONTEND_DIST_DIR: ${{ secrets.STAGING_FRONTEND_DIST_DIR }}
      STAGING_BACKEND_HEALTH_URL: ${{ secrets.STAGING_BACKEND_HEALTH_URL }}
      STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      STAGING_BACKEND_RESTART_CMD: ${{ secrets.STAGING_BACKEND_RESTART_CMD }}
    steps:
      - name: Validate required staging secrets
        run: |
          set -euo pipefail
          for key in STAGING_HOST STAGING_USER STAGING_SSH_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done
          if [ -z "${STAGING_PORT:-}" ]; then
            echo "STAGING_PORT not set, fallback to 22"
          fi
          if [ -z "${STAGING_PROJECT_DIR:-}" ]; then
            echo "STAGING_PROJECT_DIR not set, fallback to /home/armysheng/mycc"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${STAGING_PORT:-22}" -H "${STAGING_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on staging server
        run: |
          set -euo pipefail
          SSH_PORT="${STAGING_PORT:-22}"
          PROJECT_DIR="${STAGING_PROJECT_DIR:-/home/armysheng/mycc}"
          FRONTEND_DIST_DIR="${STAGING_FRONTEND_DIST_DIR:-}"
          ssh -p "${SSH_PORT}" "${STAGING_USER}@${STAGING_HOST}" \
            "PROJECT_DIR='${PROJECT_DIR}' FRONTEND_DIST_DIR='${FRONTEND_DIST_DIR}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${PROJECT_DIR}"

          # 清理历史部署产生的临时 env 备份，避免误判为脏工作树
          find mycc-backend -maxdepth 1 -type f -name '.env.bak-*' -delete 2>/dev/null || true

          DIRTY_STATUS="$(git status --porcelain --untracked-files=all | grep -vE '^\?\? mycc-backend/\.env\.bak-' || true)"
          if [ -n "${DIRTY_STATUS}" ]; then
            TS="$(date +%Y%m%d-%H%M%S)"
            BACKUP_DIR="${HOME}/deploy-backups"
            mkdir -p "${BACKUP_DIR}"
            printf '%s\n' "${DIRTY_STATUS}" | tee "${BACKUP_DIR}/dirty-${TS}.status"
            git diff > "${BACKUP_DIR}/dirty-${TS}.patch" || true
            echo "ERROR: remote working tree is dirty, deploy aborted."
            echo "Backup: ${BACKUP_DIR}/dirty-${TS}.patch"
            exit 2
          fi

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          npm -C mycc-web-react ci
          npm -C mycc-web-react run build

          if [ -n "${FRONTEND_DIST_DIR}" ]; then
            mkdir -p "${FRONTEND_DIST_DIR}"
            rsync -a --delete mycc-web-react/dist/ "${FRONTEND_DIST_DIR}/"
          fi

          npm -C mycc-backend ci
          npm -C mycc-backend run build

          if [ -n "${STAGING_BACKEND_RESTART_CMD:-}" ]; then
            echo "restart via custom command"
            bash -lc "${STAGING_BACKEND_RESTART_CMD}"
          else
            USER_UNIT="$(systemctl --user list-unit-files --type=service 2>/dev/null | awk '/mycc/ {print $1; exit}')"
            SYS_UNIT="$(sudo systemctl list-unit-files --type=service 2>/dev/null | awk '/mycc/ {print $1; exit}')"
            if [ -n "${USER_UNIT}" ] && systemctl --user restart "${USER_UNIT}" 2>/dev/null; then
              echo "restarted with systemctl --user ${USER_UNIT}"
            elif [ -n "${SYS_UNIT}" ] && sudo systemctl restart "${SYS_UNIT}" 2>/dev/null; then
              echo "restarted with sudo systemctl ${SYS_UNIT}"
            elif command -v pm2 >/dev/null 2>&1 && pm2 restart mycc-backend 2>/dev/null; then
              echo "restarted with pm2 mycc-backend"
            else
              echo "failed to restart backend service" >&2
              systemctl --user list-unit-files --type=service 2>/dev/null | grep -i mycc || true
              sudo systemctl list-unit-files --type=service 2>/dev/null | grep -i mycc || true
              pm2 list || true
              exit 1
            fi
          fi
          EOF

      - name: Verify backend health endpoint (via SSH)
        run: |
          set -euo pipefail
          SSH_PORT="${STAGING_PORT:-22}"
          HEALTH_URL="${STAGING_BACKEND_HEALTH_URL:-http://127.0.0.1:8080/health}"
          MAX_RETRIES="${STAGING_BACKEND_HEALTH_RETRIES:-20}"
          RETRY_INTERVAL="${STAGING_BACKEND_HEALTH_RETRY_INTERVAL:-3}"

          passed=false
          for attempt in $(seq 1 "${MAX_RETRIES}"); do
            if ssh -p "${SSH_PORT}" "${STAGING_USER}@${STAGING_HOST}" \
              "curl -fsS --connect-timeout 2 --max-time 5 '${HEALTH_URL}'" >/dev/null; then
              echo "Backend health check passed (${attempt}/${MAX_RETRIES})"
              passed=true
              break
            fi
            echo "Backend not ready (${attempt}/${MAX_RETRIES}), retry in ${RETRY_INTERVAL}s..."
            sleep "${RETRY_INTERVAL}"
          done

          if [ "${passed}" != "true" ]; then
            echo "Backend health check failed after ${MAX_RETRIES} attempts: ${HEALTH_URL}" >&2
            ssh -p "${SSH_PORT}" "${STAGING_USER}@${STAGING_HOST}" '
              set +e
              echo "--- systemctl --user status (mycc*) ---" >&2
              systemctl --user --no-pager --full status "mycc*" 2>/dev/null || true
              echo "--- pm2 list ---" >&2
              pm2 list 2>/dev/null || true
              echo "--- recent user logs ---" >&2
              journalctl --user -n 80 --no-pager 2>/dev/null || true
            ' || true
            exit 1
          fi

      - name: Verify frontend endpoint (optional)
        if: env.STAGING_FRONTEND_URL != ''
        run: |
          set -euo pipefail
          curl -fsSIL "${STAGING_FRONTEND_URL}" | head -n 20
